def scaled_dot_product_attention(Q, K, V, mask=None):
    """
    Scaled Dot-Product Attention
    Q, K, V: (seq_len, d_k)
    Returns: attended output, attention weights
    """
    d_k = Q.shape[-1]
    
    # 1. Compute raw attention scores
    scores = Q @ K.T / np.sqrt(d_k)   # (seq_len, seq_len)
    
    # 2. Apply causal mask (optional, for GPT-style)
    if mask is not None:
        scores = np.where(mask, scores, -1e9)
    
    # 3. Softmax to get attention weights
    scores_shifted = scores - scores.max(axis=-1, keepdims=True)
    exp_scores = np.exp(scores_shifted)
    attn_weights = exp_scores / exp_scores.sum(axis=-1, keepdims=True)
    
    # 4. Weighted sum of values
    output = attn_weights @ V
    return output, attn_weights

# Example: 4-token sequence, 8-dimensional keys
np.random.seed(42)
seq_len, d_k = 4, 8
Q = np.random.randn(seq_len, d_k)
K = np.random.randn(seq_len, d_k)
V = np.random.randn(seq_len, d_k)

# Causal mask: token i can only attend to positions j <= i
causal_mask = np.tril(np.ones((seq_len, seq_len), dtype=bool))
print("Causal mask:")
print(causal_mask.astype(int))

output, weights = scaled_dot_product_attention(Q, K, V, causal_mask)
print("\\nAttention weights (rows sum to 1.0):")
print(np.round(weights, 3))
print("\\nRow sums (should all be 1.0):", np.round(weights.sum(axis=-1), 4))
print("\\nOutput shape:", output.shape)
print("\\nKey insight: token 0 attends to itself only (causal mask)")
print("Token 3 attends to all 4 tokens [w0, w1, w2, w3]")

# No libraries — understand the algorithm fully

def get_vocab(corpus):
    """Build initial character-level vocabulary from corpus."""
    vocab = {}
    for word in corpus:
        chars = ' '.join(list(word)) + ' </w>'  # </w> marks word end
        vocab[chars] = corpus[word]
    return vocab

def get_stats(vocab):
    """Count frequency of all adjacent character pairs."""
    pairs = {}
    for word, freq in vocab.items():
        symbols = word.split()
        for i in range(len(symbols) - 1):
            pair = (symbols[i], symbols[i+1])
            pairs[pair] = pairs.get(pair, 0) + freq
    return pairs

def merge_vocab(pair, vocab):
    """Merge the most frequent pair into a single token."""
    new_vocab = {}
    bigram = ' '.join(pair)
    replacement = ''.join(pair)
    for word, freq in vocab.items():
        new_word = word.replace(bigram, replacement)
        new_vocab[new_word] = freq
    return new_vocab

# Sample corpus: word -> frequency
corpus = {
    'low': 5, 'lower': 2, 'newest': 6, 'widest': 3,
    'hello': 10, 'help': 4, 'helped': 2
}

vocab = get_vocab(corpus)
print("Initial vocabulary (character-level):")
for word, freq in list(vocab.items())[:3]:
    print(f"  '{word}' (freq={freq})")

# Run 10 BPE merge operations
print("\\nBPE Merge steps:")
for i in range(10):
    pairs = get_stats(vocab)
    if not pairs:
        break
    best = max(pairs, key=pairs.get)
    vocab = merge_vocab(best, vocab)
    print(f"  Step {i+1}: merge {best} → '{best[0]+best[1]}' (freq={pairs[best]})")

print("\\nFinal vocabulary (after 10 merges):")
for word in list(vocab.keys())[:5]:
    print(f"  '{word}'")
print("\\n→ Common subwords ('er', 'est', 'low') get merged into single tokens")
print("→ This is exactly how GPT-4 and Llama tokenizers are built!")

def cosine_similarity(a, b):
    """Cosine similarity between two vectors."""
    return np.dot(a, b) / (np.linalg.norm(a) * np.linalg.norm(b))

def batch_cosine_search(query_vec, doc_vecs, doc_names, top_k=3):
    """Find top-k most similar documents to query."""
    scores = [(name, cosine_similarity(query_vec, vec))

# Chunk size affects RAGAS Context Precision/Recall tradeoff

def fixed_window_chunk(text, chunk_size=200, overlap=50):
    """Split text into fixed-size chunks with overlap."""
    words = text.split()
    chunks = []
    start = 0
    while start < len(words):
        end = min(start + chunk_size, len(words))
        chunk = ' '.join(words[start:end])
        chunks.append(chunk)
        start += chunk_size - overlap  # overlap for context continuity
    return chunks

def sentence_chunk(text, sentences_per_chunk=3):
    """Chunk by sentence boundaries — better semantic coherence."""
    sentences = text.replace('!', '.').replace('?', '.').split('.')
    sentences = [s.strip() for s in sentences if s.strip()]
    chunks = []
    for i in range(0, len(sentences), sentences_per_chunk):
        chunk = '. '.join(sentences[i:i+sentences_per_chunk]) + '.'
        chunks.append(chunk)
    return chunks

# Exam KPI: "cost per interaction" = sum of tokens × price

# Simplified tokenizer (approximate: 1 token ≈ 4 chars for English)
def estimate_tokens(text):
    """Quick estimate: ~4 chars per token for English text."""
    return max(1, len(text) // 4)

def count_message_tokens(messages):
    """Estimate tokens in a ChatML message list."""
    total = 2  # base tokens for any message list
    for msg in messages:
        total += 4  # per-message overhead (role, content markers)
        total += estimate_tokens(msg.get("content", ""))
    return total

# NIM pricing (approximate as of 2025, check build.nvidia.com for current)
PRICING = {
    "meta/llama-3.1-8b-instruct":  {"input": 0.15, "output": 0.15},  # per 1M tokens
    "meta/llama-3.1-70b-instruct": {"input": 0.89, "output": 0.89},
    "meta/llama-3.3-70b-instruct": {"input": 0.89, "output": 0.89},
    "nvidia/llama-3.1-nemotron-70b": {"input": 0.55, "output": 0.55},
}

def estimate_cost(messages, response_text, model):
    """Estimate cost of one LLM call."""
    input_tokens = count_message_tokens(messages)
    output_tokens = estimate_tokens(response_text)
    
    if model not in PRICING:
        return None, input_tokens, output_tokens
        
    p = PRICING[model]
    input_cost = (input_tokens / 1_000_000) * p["input"]
    output_cost = (output_tokens / 1_000_000) * p["output"]
    total = input_cost + output_cost
    return total, input_tokens, output_tokens

# Shows how to construct structured prompts

class PromptTemplate:
    """Reusable prompt template with variable interpolation."""
    
    def __init__(self, template, input_variables):
        self.template = template
        self.input_variables = input_variables
    
    def format(self, **kwargs):
        # Validate inputs
        for var in self.input_variables:
            if var not in kwargs:
                raise ValueError(f"Missing variable: {var}")
        return self.template.format(**kwargs)
    
    def token_estimate(self, **kwargs):
        """Estimate token count of rendered prompt."""
        rendered = self.format(**kwargs)
        return len(rendered) // 4  # rough estimate

def simple_faithfulness_score(answer, context):
    """

    Real RAGAS: LLM decomposes answer into claims, 
    then verifies each claim against context using LLM.

        if not words:

        # Simple heuristic: phrase is "supported" if >50% of key words are in context

# LoRA: Low-Rank Adaptation
# Instead of updating W (d x d), train only A (d x r) and B (r x d)
# where r << d. Forward pass: W' = W + scaling * (B @ A)

np.random.seed(42)

def show_lora_math(d=64, r=8, alpha=16):
    """
    d: model dimension (hidden size)
    r: LoRA rank
    alpha: scaling factor (alpha/r is the actual scale)
    """
    scaling = alpha / r
    
    # Original weight matrix (FROZEN during LoRA training)
    W_orig = np.random.randn(d, d) * 0.02
    
    # LoRA matrices (these are TRAINED)
    # A initialized to Gaussian, B initialized to ZERO
    A = np.random.randn(d, r) * 0.01  # (d x r)
    B = np.zeros((r, d))              # (r x d) — starts at zero
    # Why B=0? So LoRA adapter starts as identity (no change to W)
    
    print(f"=== LoRA Configuration ===")
    print(f"Model dimension d = {d}")
    print(f"LoRA rank      r = {r}")
    print(f"Alpha          α = {alpha}")
    print(f"Scaling     α/r = {scaling:.2f}")
    print()
    
    # Parameter counts
    original_params = d * d
    lora_params = d * r + r * d  # A + B
    reduction = (1 - lora_params / original_params) * 100
    
    print(f"=== Parameter Counts ===")
    print(f"Full weight W: {d}×{d} = {original_params:,} parameters")
    print(f"LoRA A:        {d}×{r} = {d*r:,} parameters")
    print(f"LoRA B:        {r}×{d} = {r*d:,} parameters")
    print(f"LoRA total:    {lora_params:,} parameters")
    print(f"Reduction:     {reduction:.1f}% fewer trainable parameters!")

    # Forward pass comparison
    x = np.random.randn(1, d)  # input vector
    
    # Standard forward (full fine-tuning)
    y_full = x @ W_orig
    
    # LoRA forward: (frozen) + (adapter)
    # At step 0: B=0, so adapter output is 0 (perfect initialization!)
    delta_W = scaling * (B @ A).T   # LoRA delta (shape: d x d)
    y_lora = x @ (W_orig + delta_W)
    
    print(f"=== Forward Pass ===")
    print(f"Input x shape:        {x.shape}")
    print(f"Output (base W):      mean={y_full.mean():.4f}")
    print(f"Output (W + LoRA):    mean={y_lora.mean():.4f}")
    print(f"LoRA delta (B@0=0):   {np.abs(delta_W).max():.6f} (starts at 0 ✓)")

    print("=== Memory Savings (at scale) ===")

        lora = d_scale * r_scale * 2

let editor = null;
let pyodide = null;
let currentSnippet = 0;

async function initPyodide() {
  try {
    pyodide = await loadPyodide({
      indexURL: "https://cdn.jsdelivr.net/pyodide/v0.24.1/full/"
    });
    
    document.getElementById('loading-banner').innerHTML = '<span style="animation:spin 1s linear infinite;display:inline-block">⟳</span> Installing Python packages (numpy)...';
    await pyodide.loadPackage(["numpy", "micropip"]);
    
    document.getElementById('loading-banner').style.display = 'none';
    const main = document.getElementById('main-editor');
    main.style.display = 'flex';
    document.getElementById('run-btn').disabled = false;
    
    appendOutput('✅ Python runtime ready (with numpy)! Click ▶ Run to execute.', 'out-success');
  } catch(e) {
    document.getElementById('loading-banner').innerHTML = '❌ Failed to load Python runtime. Check your internet connection.';
  }
}

function initEditor() {
  editor = CodeMirror.fromTextArea(document.getElementById('code-editor'), {
    mode: 'python',
    theme: 'dracula',
    lineNumbers: true,
    matchBrackets: true,
    indentUnit: 4,
    tabSize: 4,
    indentWithTabs: false,
    lineWrapping: false,
    extraKeys: { "Ctrl-Enter": runCode, "Cmd-Enter": runCode }
  });
  editor.setValue(SNIPPETS[0].code.trim());
}

function loadSnippet(idx) {
  currentSnippet = idx;
  const s = SNIPPETS[idx];
  document.getElementById('snippet-title').textContent = s.title;
  if (editor) editor.setValue(s.code.trim());
  
  document.querySelectorAll('.snippet-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === idx);
  });
  clearOutput();
}

function appendOutput(text, cls = 'out-info') {
  const out = document.getElementById('output');
  const span = document.createElement('span');
  span.className = cls;
  span.textContent = text + '\n';
  if (out.textContent === 'Run a snippet to see output here.') out.textContent = '';
  out.appendChild(span);
  out.scrollTop = out.scrollHeight;
}

function clearOutput() {
  const out = document.getElementById('output');
  out.textContent = '';
}

async function runCode() {
  if (!pyodide) { appendOutput('Python runtime not ready yet...', 'out-err'); return; }
  
  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  btn.textContent = '⟳ Running…';
  clearOutput();
  
  const code = editor ? editor.getValue() : '';
  
  try {
    // Redirect stdout/stderr
    pyodide.runPython(`
import sys
from io import StringIO
_stdout = StringIO()
_stderr = StringIO()
sys.stdout = _stdout
sys.stderr = _stderr
    `);
    
    await pyodide.runPythonAsync(code);
    
    const stdout = pyodide.runPython('_stdout.getvalue()');
    const stderr = pyodide.runPython('_stderr.getvalue()');
    
    if (stdout) appendOutput(stdout, 'out-info');
    if (stderr) appendOutput(stderr, 'out-err');
    if (!stdout && !stderr) appendOutput('✅ Code ran successfully with no output.', 'out-success');
    
  } catch(e) {
    appendOutput('❌ Error: ' + e.message, 'out-err');
  } finally {
    // Restore stdout
    try { pyodide.runPython('sys.stdout = sys.__stdout__; sys.stderr = sys.__stderr__'); } catch(_) {}
    btn.disabled = false;
    btn.textContent = '▶ Run';
  }
}

// Init
window.addEventListener('DOMContentLoaded', () => {
  initEditor();
});

// Load Pyodide
const script = document.createElement('script');
script.src = 'https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js';
script.onload = initPyodide;
document.head.appendChild(script);
</script>
