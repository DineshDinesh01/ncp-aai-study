<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Write-ups — NCP-AAI Study Guide</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <script src="../assets/js/components.js" defer></script>
  <!-- Marked.js for Markdown parsing -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- Highlight.js for Code Formatting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <!-- DOMPurify to prevent XSS from marked -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
  
  <style>
    /* Override global layout constraints so notes fills the full screen */
    .layout {
      height: 100vh;
      overflow: hidden;
      /* keep padding-top from global CSS so topbar doesn't overlap */
    }
    /* Hide the global site sidebar — notes has its own panel */
    .sidebar { display: none !important; }
    /* .content is a flex item inside .layout (row direction),
       so DO NOT set height: 0 — let align-self: stretch fill it */
    .content {
      max-width: none !important;
      width: 100% !important;
      padding: 0 !important;
      margin: 0 !important;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Specific styles for Notes App */
    .notes-container {
      display: flex;
      flex: 1;
      min-height: 0; /* prevent overflow in column flex */
      gap: 0;
      background: var(--bg-primary);
      border-radius: 0;
      overflow: hidden;
      border: none;
      border-top: 1px solid var(--border);
    }
    .notes-sidebar {
      width: 250px;
      min-width: 250px;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease, width 0.3s ease;
    }
    .notes-sidebar-header {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .notes-sidebar-header h3 { margin: 0; font-size: 1rem; color: #fff; }
    .btn-new-note {
      background: var(--nvidia-green);
      color: #000;
      border: none;
      padding: 0.25rem 0.6rem;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      transition: background 0.2s;
    }
    .btn-new-note:hover { background: var(--nvidia-green-dark); }

    .notes-sidebar-tools {
      padding: 0.5rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-primary);
    }
    #notes-search-input {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.4rem 0.6rem;
      color: #fff;
      font-size: 0.85rem;
      outline: none;
      margin-bottom: 0.5rem;
      box-sizing: border-box;
    }
    #notes-search-input:focus { border-color: var(--nvidia-green); }
    .notes-sidebar-actions {
      display: flex;
      gap: 0.5rem;
    }
    .notes-sidebar-actions button {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 4px;
      padding: 0.25rem 0;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .notes-sidebar-actions button:hover { background: var(--bg-card); color: #fff; border-color: var(--text-muted); }

    .notes-list {
      flex: 1;
      overflow-y: auto;
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .note-item {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s;
    }
    .note-item:hover, .note-item.active {
      background: #1c232a;
    }
    .note-item-title {
      font-weight: 600;
      color: #fff;
      margin-bottom: 0.25rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .note-item-date {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .notes-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-card);
      min-width: 0;
    }
    .notes-toolbar {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }
    .note-title-input {
      flex: 1;
      min-width: 120px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.5rem 1rem;
      color: #fff;
      font-size: 1.25rem;
      font-weight: 600;
      outline: none;
      transition: border-color 0.2s;
    }
    .note-title-input:focus { border-color: var(--nvidia-green); }
    .note-title-input::placeholder { color: var(--text-muted); }

    .note-topic-select {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 4px;
      padding: 0.4rem 0.6rem;
      outline: none;
      font-size: 0.85rem;
      cursor: pointer;
      max-width: 200px;
    }
    .note-topic-select:focus { border-color: var(--nvidia-green); }

    .btn-action {
      background: transparent;
      border: 1px solid var(--border);
      color: #fff;
      padding: 0.3rem 0.8rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-action:hover { background: var(--bg-primary); }
    .btn-delete { color: #ff5c5c; border-color: #ff5c5c; }
    .btn-delete:hover { background: rgba(255,92,92,0.1); }

    /* Mobile toggle for notes sidebar */
    .btn-notes-sidebar-toggle {
      display: none;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 4px;
      padding: 0.3rem 0.6rem;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      transition: all 0.2s;
    }
    .btn-notes-sidebar-toggle:hover { background: var(--bg-card); color: #fff; }

    /* Mobile editor/preview tab bar */
    .notes-view-tabs {
      display: none;
      border-bottom: 1px solid var(--border);
    }
    .notes-view-tabs button {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      padding: 0.5rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .notes-view-tabs button.active {
      color: var(--nvidia-green);
      border-bottom-color: var(--nvidia-green);
    }

    .notes-editor-split {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .notes-editor-pane, .notes-preview-pane {
      flex: 1;
      padding: 1rem;
      overflow-y: auto;
    }
    .notes-editor-pane {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .notes-format-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding-bottom: 0.5rem;
      margin-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .format-btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .format-btn:hover { background: var(--border); color: var(--nvidia-green); border-color: var(--nvidia-green); }

    .note-content-input {
      flex: 1;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1rem;
      color: #fff;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.9rem;
      resize: none;
      outline: none;
      line-height: 1.5;
      transition: border-color 0.2s;
    }
    .note-content-input:focus { border-color: var(--nvidia-green); }

    /* Markdown preview styling */
    .notes-preview-pane h1 { font-size: 1.5rem; margin-top: 0; color: #fff; margin-bottom: 0.5rem; }
    .notes-preview-pane h2 { font-size: 1.25rem; margin-top: 1rem; color: #fff; margin-bottom: 0.5rem; }
    .notes-preview-pane h3 { font-size: 1.1rem; margin-top: 1rem; color: #fff; margin-bottom: 0.5rem; }
    .notes-preview-pane p { margin-bottom: 1rem; }
    .notes-preview-pane code {
      background: #111;
      padding: 0.2em 0.4em;
      border-radius: 3px;
      font-family: var(--font-mono, 'JetBrains Mono', monospace);
      font-size: 0.9em;
      color: var(--nvidia-green);
    }
    .notes-preview-pane pre {
      background: #111;
      padding: 1rem;
      border-radius: 4px;
      overflow-x: auto;
      border: 1px solid var(--border);
      margin-bottom: 1rem;
    }
    .notes-preview-pane pre code { background: transparent; padding: 0; color: inherit;}
    .notes-preview-pane blockquote {
      border-left: 4px solid var(--nvidia-green);
      margin: 0 0 1rem 0;
      padding-left: 1rem;
      color: var(--text-muted);
    }
    .notes-preview-pane ul, .notes-preview-pane ol { margin-left: 1.5rem; margin-bottom: 1rem; }

    /* Empty State */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      flex: 1;
    }

    /* ── Notes Responsive ──────────────────────────────────── */

    /* Tablet: shrink sidebar slightly */
    @media (max-width: 900px) {
      .notes-sidebar { width: 210px; min-width: 210px; }
      .note-title-input { font-size: 1rem; }
    }

    /* Mobile: full overlay sidebar + tab-based editor/preview */
    @media (max-width: 768px) {
      .notes-container {
        border-top: none;
        position: relative;
        overflow: visible;
      }

      /* Sidebar becomes a sliding overlay */
      .notes-sidebar {
        position: fixed;
        top: var(--topbar-height, 56px);
        left: 0;
        bottom: 0;
        width: 80vw;
        max-width: 300px;
        min-width: 0;
        z-index: 200;
        transform: translateX(-100%);
        box-shadow: 4px 0 16px rgba(0,0,0,0.5);
      }
      .notes-sidebar.mobile-open {
        transform: translateX(0);
      }

      /* Overlay backdrop */
      .notes-sidebar-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        z-index: 199;
      }
      .notes-sidebar-backdrop.visible { display: block; }

      /* Show the sidebar toggle button */
      .btn-notes-sidebar-toggle { display: inline-flex; align-items: center; }

      /* Show tab bar, hide split view */
      .notes-view-tabs { display: flex; }

      .notes-editor-split {
        flex-direction: column;
      }
      /* Default: show editor, hide preview */
      .notes-editor-pane {
        flex: 1;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .notes-preview-pane {
        flex: 1;
      }
      /* Tab-driven visibility */
      .notes-editor-split.show-preview .notes-editor-pane { display: none; }
      .notes-editor-split.show-editor .notes-preview-pane { display: none; }

      /* Toolbar wraps on small screens */
      .notes-toolbar {
        flex-wrap: wrap;
        gap: 0.4rem;
        padding: 0.5rem 0.75rem;
      }
      .note-title-input {
        width: 100%;
        flex: unset;
        font-size: 1rem;
        padding: 0.4rem 0.75rem;
        order: 2;
      }
      .btn-notes-sidebar-toggle { order: 1; }
      .note-topic-select { order: 3; flex: 1; max-width: unset; }
      #save-status { order: 4; margin: 0; }
      .btn-download-note { order: 5; }
      .btn-delete-note { order: 6; }
      #btn-save-note { order: 7; }
    }

    @media (max-width: 480px) {
      .notes-sidebar { width: 92vw; }
      .note-title-input { font-size: 0.9rem; }
      .notes-toolbar { gap: 0.3rem; padding: 0.4rem 0.5rem; }
    }
  </style>
</head>
<body>

  <site-header basepath=".." active="notes"></site-header>

  <div class="layout">
    <site-sidebar basepath=".." active="notes"></site-sidebar>
    
    <main class="content">
      <!-- Mobile sidebar backdrop -->
      <div id="notes-sidebar-backdrop" class="notes-sidebar-backdrop"></div>

      <div class="notes-container">

        <!-- Sidebar for notes list -->
        <div class="notes-sidebar" id="notes-sidebar">
          <div class="notes-sidebar-header">
            <h3>My Write-ups</h3>
            <button id="btn-new-note" class="btn-new-note">+ New</button>
          </div>
          <div class="notes-sidebar-tools">
            <input type="text" id="notes-search-input" placeholder="Search notes..." autocomplete="off">
            <div class="notes-sidebar-actions">
              <button id="btn-export-notes" title="Export All Notes to JSON">⬇️ Export</button>
              <button id="btn-import-trigger" title="Import Notes from JSON">⬆️ Import</button>
              <input type="file" id="notes-file-input" accept=".json" style="display: none;">
            </div>
          </div>
          <ul id="notes-list" class="notes-list">
            <!-- Notes injected dynamically by JS -->
          </ul>
        </div>

        <!-- Main Editor Area -->
        <div id="notes-main-area" class="notes-main" style="display: none;">
          <div class="notes-toolbar">
            <button id="btn-notes-sidebar-toggle" class="btn-notes-sidebar-toggle" title="Toggle notes list">☰</button>
            <input type="text" id="note-title" class="note-title-input" placeholder="Note Title..." autocomplete="off">
            <select id="note-topic-select" class="note-topic-select">
              <option value="">No Domain / Topic</option>
            </select>
            <span id="save-status" style="color: var(--text-muted); font-size: 0.8rem; margin-left: auto; margin-right: 0.5rem;"></span>
            <button id="btn-download-note" class="btn-action btn-download-note" title="Download note as .md">⬇️ .md</button>
            <button id="btn-delete-note" class="btn-action btn-delete btn-delete-note">Delete</button>
            <button id="btn-save-note" class="btn-new-note">Save</button>
          </div>
          <!-- Mobile editor/preview tabs -->
          <div class="notes-view-tabs" id="notes-view-tabs">
            <button id="tab-editor" class="active" onclick="switchNotesTab('editor')">Editor</button>
            <button id="tab-preview" onclick="switchNotesTab('preview')">Preview</button>
          </div>
          <div class="notes-editor-split show-editor" id="notes-editor-split">
            <div class="notes-editor-pane">
              <div class="notes-format-bar">
                <button type="button" class="format-btn" data-tag="**" title="Bold">B</button>
                <button type="button" class="format-btn" data-tag="*" title="Italic">I</button>
                <button type="button" class="format-btn" data-prefix="# " title="Heading">H</button>
                <button type="button" class="format-btn" data-prefix="- " title="List">List</button>
                <button type="button" class="format-btn" data-wrap="[","](url)" title="Link">Link</button>
                <button type="button" class="format-btn" data-wrap="```\n","\n```" title="Code Block">&lt;/&gt;</button>
              </div>
              <textarea id="note-content" class="note-content-input" placeholder="Start typing in Markdown..."></textarea>
            </div>
            <div class="notes-preview-pane" id="note-preview">
              <!-- Rendered markdown goes here -->
            </div>
          </div>
        </div>
        
        <!-- Empty State -->
        <div id="notes-empty-state" class="empty-state">
          <h2>No Note Selected</h2>
          <p>Select a note from the sidebar or click "+ New" to create one.</p>
        </div>

      </div>
    </main>
  </div>

  <site-footer basepath=".."></site-footer>
  
  <script src="../assets/js/notes.js"></script>
  <script>
    // ── Mobile notes sidebar toggle ──────────────────────────
    (function () {
      const toggle   = document.getElementById('btn-notes-sidebar-toggle');
      const sidebar  = document.getElementById('notes-sidebar');
      const backdrop = document.getElementById('notes-sidebar-backdrop');

      function openSidebar() {
        sidebar.classList.add('mobile-open');
        backdrop.classList.add('visible');
      }
      function closeSidebar() {
        sidebar.classList.remove('mobile-open');
        backdrop.classList.remove('visible');
      }

      if (toggle)   toggle.addEventListener('click', openSidebar);
      if (backdrop) backdrop.addEventListener('click', closeSidebar);

      // Close sidebar when a note is selected (mobile UX)
      document.getElementById('notes-list').addEventListener('click', function () {
        if (window.innerWidth <= 768) closeSidebar();
      });
    })();

    // ── Mobile editor / preview tabs ────────────────────────
    function switchNotesTab(tab) {
      const split      = document.getElementById('notes-editor-split');
      const tabEditor  = document.getElementById('tab-editor');
      const tabPreview = document.getElementById('tab-preview');
      if (!split) return;
      if (tab === 'preview') {
        split.classList.remove('show-editor');
        split.classList.add('show-preview');
        tabEditor.classList.remove('active');
        tabPreview.classList.add('active');
      } else {
        split.classList.remove('show-preview');
        split.classList.add('show-editor');
        tabPreview.classList.remove('active');
        tabEditor.classList.add('active');
      }
    }
  </script>
</body>
</html>
